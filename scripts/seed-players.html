<!DOCTYPE html>
<html>
<head><title>Seed Players</title>
<style>
  body { font-family: system-ui; padding: 20px; max-width: 720px; margin: 0 auto; background: #0d2147; color: #e2e8f0; }
  h2 { color: #60a5fa; }
  button { padding: 12px 24px; font-size: 16px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
  button:disabled { opacity: 0.5; }
  pre { background: #000; color: #4ade80; padding: 16px; border-radius: 8px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; max-height: 60vh; overflow-y: auto; }
  textarea { width: 100%; padding: 10px; font-size: 13px; border: 1px solid #334155; border-radius: 6px; font-family: monospace; background: #1e293b; color: #e2e8f0; }
  label { font-size: 13px; font-weight: 600; display: block; margin: 12px 0 4px; color: #94a3b8; }
  .hint { font-size: 12px; color: #64748b; line-height: 1.5; margin-top: 4px; }
  select { padding: 8px 12px; font-size: 14px; border-radius: 6px; background: #1e293b; color: #e2e8f0; border: 1px solid #334155; }
</style>
</head>
<body>
<h2>Crear jugadores e inscribirlos al evento</h2>

<p>1. Logueate con tu cuenta admin de Google.<br>
2. Pegá la lista de jugadores en el formato indicado.<br>
3. Elegí el evento donde inscribirlos.<br>
4. Ejecutá.</p>

<label>Lista de jugadores (uno por línea)</label>
<textarea id="players" rows="14" placeholder="Formato: Nombre|Apellido|email@real.com|posicion

Donde posicion es una de: drive, reves, indistinto

Ejemplo:
Martin|Gonzalez|martin@gmail.com|drive
Lucas|Rodriguez|lucas@gmail.com|reves
Federico|Lopez|fede@gmail.com|indistinto"></textarea>
<p class="hint">Separá cada campo con "|" (pipe). Posicion: drive, reves o indistinto.</p>

<div>
  <label>Evento</label>
  <select id="eventSelect" disabled>
    <option>Primero logueate para listar eventos</option>
  </select>
</div>

<div style="margin-top: 20px;">
  <button id="loginBtn" onclick="doLogin()">1. Login con Google</button>
  <button id="runBtn" onclick="run()" disabled>2. Crear e inscribir</button>
</div>

<pre id="log"></pre>

<script type="module">
import { initializeApp, deleteApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signOut, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, addDoc, updateDoc, collection, query, where, getDocs, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyB0c3F_2UxWu0rwpNBIC61mE1EWB6xExNQ",
  authDomain: "padel-hub-4b3a0.firebaseapp.com",
  projectId: "padel-hub-4b3a0",
  storageBucket: "padel-hub-4b3a0.firebasestorage.app",
  messagingSenderId: "546100517843",
  appId: "1:546100517843:web:f2f2223eb0e5dadd8e6d26"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const logEl = document.getElementById('log');
function print(msg) { logEl.textContent += msg + '\n'; logEl.scrollTop = logEl.scrollHeight; }

let adminUid = null;
let events = [];

function randomPassword() {
  return 'pdl' + Math.random().toString(36).slice(-10);
}

window.doLogin = async function() {
  try {
    const provider = new GoogleAuthProvider();
    const cred = await signInWithPopup(auth, provider);
    adminUid = cred.user.uid;
    print('OK Login: ' + cred.user.email);

    // Load events (not just published, in case admin wants to seed to draft or other)
    const snap = await getDocs(collection(db, 'events'));
    events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const select = document.getElementById('eventSelect');
    select.innerHTML = '';
    if (events.length === 0) {
      select.innerHTML = '<option>No hay eventos</option>';
    } else {
      events.forEach(ev => {
        const opt = document.createElement('option');
        opt.value = ev.id;
        opt.textContent = ev.name + ' [' + ev.status + '] (' + (ev.currentRegistrations || 0) + '/' + ev.maxCapacity + ')';
        select.appendChild(opt);
      });
      select.disabled = false;
      document.getElementById('runBtn').disabled = false;
      print('OK Eventos cargados: ' + events.length);
    }
    document.getElementById('loginBtn').disabled = true;
  } catch (e) {
    print('ERROR login: ' + e.message);
  }
}

window.run = async function() {
  const raw = document.getElementById('players').value.trim();
  if (!raw) { alert('Pegá los jugadores'); return; }

  const eventId = document.getElementById('eventSelect').value;
  const event = events.find(e => e.id === eventId);
  if (!event) { alert('Elegí un evento'); return; }

  const lines = raw.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#'));
  const players = [];
  for (const line of lines) {
    const parts = line.split('|').map(p => p.trim());
    if (parts.length !== 4) {
      print('Linea invalida (debe tener 4 campos): ' + line);
      continue;
    }
    const [firstName, lastName, email, position] = parts;
    if (!['drive', 'reves', 'indistinto'].includes(position)) {
      print('Posicion invalida "' + position + '" en: ' + line);
      continue;
    }
    players.push({ firstName, lastName, email, position });
  }

  if (players.length === 0) { print('Sin jugadores validos'); return; }

  print('\nEvento: ' + event.name);
  print('Jugadores a crear: ' + players.length);
  print('---\n');

  document.getElementById('runBtn').disabled = true;

  let created = 0;
  let existed = 0;
  let failed = 0;
  const successfulUids = [];
  const now = Timestamp.now();

  for (const player of players) {
    const displayName = player.firstName + ' ' + player.lastName;
    print('>>> ' + displayName + ' (' + player.email + ')');

    // Create user via secondary app to avoid hijacking admin session
    const secondary = initializeApp(firebaseConfig, 'secondary-' + Date.now());
    const secondaryAuth = getAuth(secondary);
    let uid;

    try {
      const cred = await createUserWithEmailAndPassword(secondaryAuth, player.email, randomPassword());
      uid = cred.user.uid;
      print('  OK Auth creado');
      created++;
    } catch (e) {
      if (e.code === 'auth/email-already-in-use') {
        print('  ! Email ya existe en Auth, saltando creacion de auth');
        existed++;
        // We can't get the uid easily without logging in. Skip.
        await signOut(secondaryAuth).catch(() => {});
        await deleteApp(secondary).catch(() => {});
        failed++;
        continue;
      }
      print('  X Auth error: ' + e.code + ' - ' + e.message);
      await deleteApp(secondary).catch(() => {});
      failed++;
      continue;
    }

    // Sign out the secondary to avoid leftover session
    try { await signOut(secondaryAuth); } catch {}
    try { await deleteApp(secondary); } catch {}

    // Now with admin session, create user doc
    try {
      await setDoc(doc(db, 'users', uid), {
        email: player.email,
        displayName,
        firstName: player.firstName,
        lastName: player.lastName,
        position: player.position,
        role: 'player',
        adminCreated: true,
        createdAt: now,
        updatedAt: now,
      });
      print('  OK Perfil creado');
    } catch (e) {
      print('  X Perfil error: ' + e.message);
      failed++;
      continue;
    }

    // Check if already registered
    try {
      const dupQuery = query(collection(db, 'registrations'),
        where('eventId', '==', eventId),
        where('userId', '==', uid),
        where('status', '==', 'active')
      );
      const dupSnap = await getDocs(dupQuery);
      if (!dupSnap.empty) {
        print('  ! Ya inscripto, saltando');
        successfulUids.push(uid);
        continue;
      }
    } catch {}

    // Register to event
    try {
      await addDoc(collection(db, 'registrations'), {
        eventId,
        userId: uid,
        userName: displayName,
        userPosition: player.position,
        paymentStatus: 'pending',
        status: 'active',
        createdAt: now,
        updatedAt: now,
      });
      print('  OK Inscripto al evento');
      successfulUids.push(uid);
    } catch (e) {
      print('  X Inscripcion error: ' + e.message);
    }
  }

  // Update event counter
  try {
    const currentCount = (event.currentRegistrations || 0) + successfulUids.length;
    await updateDoc(doc(db, 'events', eventId), {
      currentRegistrations: currentCount,
      updatedAt: now,
    });
    print('\nContador actualizado: ' + currentCount + '/' + event.maxCapacity);
  } catch (e) {
    print('\nX Error actualizando contador: ' + e.message);
  }

  print('\n================================');
  print('Creados: ' + created);
  print('Ya existian: ' + existed);
  print('Fallidos: ' + failed);
  print('Inscriptos OK: ' + successfulUids.length);
  print('================================');
  document.getElementById('runBtn').disabled = false;
}
</script>
</body>
</html>
