<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="paddleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <radialGradient id="ballGrad" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#f0e35a"/>
      <stop offset="100%" style="stop-color:#c9b422"/>
    </radialGradient>
  </defs>

  <!-- Paddle rotated -->
  <g transform="rotate(-25 24 28)">
    <!-- Head: teardrop/oval -->
    <ellipse cx="24" cy="18" rx="14" ry="17" fill="url(#paddleGrad)" stroke="#ef4444" stroke-width="2.5"/>
    <!-- Holes pattern (typical padel paddle) -->
    <circle cx="24" cy="6" r="1.5" fill="#ffffff"/>
    <circle cx="18" cy="12" r="1.5" fill="#ffffff"/>
    <circle cx="24" cy="12" r="1.5" fill="#ffffff"/>
    <circle cx="30" cy="12" r="1.5" fill="#ffffff"/>
    <circle cx="15" cy="18" r="1.5" fill="#ffffff"/>
    <circle cx="21" cy="18" r="1.5" fill="#ffffff"/>
    <circle cx="27" cy="18" r="1.5" fill="#ffffff"/>
    <circle cx="33" cy="18" r="1.5" fill="#ffffff"/>
    <circle cx="18" cy="24" r="1.5" fill="#ffffff"/>
    <circle cx="24" cy="24" r="1.5" fill="#ffffff"/>
    <circle cx="30" cy="24" r="1.5" fill="#ffffff"/>
    <circle cx="21" cy="30" r="1.5" fill="#ffffff"/>
    <circle cx="27" cy="30" r="1.5" fill="#ffffff"/>
    <!-- Neck -->
    <rect x="22" y="34" width="4" height="6" fill="#ffffff" stroke="#0f172a" stroke-width="1"/>
    <!-- Handle -->
    <rect x="20" y="40" width="8" height="16" rx="2" fill="#ffffff" stroke="#0f172a" stroke-width="1"/>
    <!-- Grip lines -->
    <line x1="20" y1="44" x2="28" y2="44" stroke="#ef4444" stroke-width="0.8"/>
    <line x1="20" y1="48" x2="28" y2="48" stroke="#ef4444" stroke-width="0.8"/>
    <line x1="20" y1="52" x2="28" y2="52" stroke="#ef4444" stroke-width="0.8"/>
  </g>

  <!-- Ball -->
  <circle cx="50" cy="40" r="9" fill="url(#ballGrad)" stroke="#8a7a1a" stroke-width="1"/>
  <!-- Ball seam -->
  <path d="M 43 35 Q 50 42, 44 47" stroke="white" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M 57 35 Q 50 42, 56 47" stroke="white" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- Ball shine -->
  <ellipse cx="46" cy="37" rx="2.5" ry="1.5" fill="white" opacity="0.4"/>
</svg>
